version: 2

dist: dist/goreleaser

builds:
  - id: aim
    main: ./cmd/aim
    binary: bin/aim-{{ .Version }}-linux-{{ .Arch }}
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .Commit }} -X main.date={{ .Date }}

archives:
  - id: aim-archive
    ids:
      - aim
    formats:
      - tar.gz
    name_template: aim-{{ .Version }}-linux-{{ .Arch }}
    wrap_in_directory: false

checksum:
  name_template: checksums.txt
  algorithm: sha256

release:
  prerelease: auto
  make_latest: "{{ if .Prerelease }}false{{ else }}true{{ end }}"
  name_template: "{{ .Version }}"
