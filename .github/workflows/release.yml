name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (vX.Y.Z or vX.Y.Z-<prerelease>)"
        required: true
        type: string

permissions:
  actions: read
  contents: write

concurrency:
  group: release-${{ github.event.workflow_run.head_sha || github.sha || github.event.inputs.tag || github.run_id }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'push' ||
        (
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.head_branch == 'main' &&
          github.event.workflow_run.conclusion == 'success'
        )
      }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_REF: ${{ github.ref }}
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          semver='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[A-Za-z-][0-9A-Za-z-]*)(\.(0|[1-9][0-9]*|[A-Za-z-][0-9A-Za-z-]*))*))?$'

          fail_if_invalid_tag() {
            if [[ ! "$1" =~ $semver ]]; then
              echo "::error::Release tag $1 must match vX.Y.Z or vX.Y.Z-<prerelease>, for example v1.2.3 or v1.2.3-rc.1."
              exit 1
            fi
          }

          tag_commit() {
            git rev-parse "$1^{}"
          }

          case "$EVENT_NAME" in
            workflow_dispatch)
              tag="$(printf '%s' "$DISPATCH_TAG" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
              fail_if_invalid_tag "$tag"
              sha="$(tag_commit "$tag")"
              ;;
            push)
              tag="${EVENT_REF#refs/tags/}"
              fail_if_invalid_tag "$tag"
              sha="$(tag_commit "$tag")"
              ;;
            workflow_run)
              sha="$WORKFLOW_RUN_SHA"
              tag="$(git tag --points-at "$sha" --list 'v*' | python3 -c 'import re, sys; p = re.compile(r"^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(?:-((?:0|[1-9][0-9]*|[A-Za-z-][0-9A-Za-z-]*)(?:\.(?:0|[1-9][0-9]*|[A-Za-z-][0-9A-Za-z-]*))*))?$"); tags = [t for t in map(str.strip, sys.stdin) if p.match(t)]; key = lambda t: (lambda m: (int(m.group(1)), int(m.group(2)), int(m.group(3)), m.group(4) is None, m.group(4) or ""))(p.match(t)); print(max(tags, key=key) if tags else "")')"
              if [[ -z "$tag" ]]; then
                echo "CI passed for $sha, but no SemVer release tag points at that commit. Skipping release."
                echo "should_release=false" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              ;;
          esac

          ci_run_url="$(gh run list \
            --repo "$REPO" \
            --workflow ci.yml \
            --branch main \
            --event push \
            --status success \
            --commit "$sha" \
            --json url \
            --jq '.[0].url // empty')"

          if [[ -z "$ci_run_url" ]]; then
            echo "::error::No successful CI push run for $sha on main. Releases must reference a commit that passed CI."
            exit 1
          fi
          echo "Found successful CI run $ci_run_url for $sha."

          if gh release view "$tag" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $tag already exists. Skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$tag" == *-* ]]; then
            echo "Preparing prerelease $tag."
          else
            echo "Preparing stable release $tag."
          fi

          {
            echo "should_release=true"
            echo "tag=$tag"
            echo "sha=$sha"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        if: steps.release-tag.outputs.should_release == 'true'
        run: git checkout --force "${{ steps.release-tag.outputs.tag }}"

      - name: Setup Go
        if: steps.release-tag.outputs.should_release == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check GoReleaser config
        if: steps.release-tag.outputs.should_release == 'true'
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "v2.16.0"
          args: check

      - name: Generate release notes
        if: steps.release-tag.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.release-tag.outputs.tag }}
        run: |
          set -euo pipefail

          previous_tag="$(TAG="$TAG" python3 <<'PY'
          import os
          import re
          import subprocess
          import sys

          semver = re.compile(r"^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(?:-((?:0|[1-9][0-9]*|[A-Za-z-][0-9A-Za-z-]*)(?:\.(?:0|[1-9][0-9]*|[A-Za-z-][0-9A-Za-z-]*))*))?$")
          current = os.environ["TAG"]
          current_match = semver.match(current)
          if not current_match:
              sys.exit(f"invalid semver tag: {current}")

          def prerelease_key(value):
              if value is None:
                  return (1,)
              parts = []
              for part in value.split("."):
                  if part.isdigit():
                      parts.append((0, int(part)))
                  else:
                      parts.append((1, part))
              return (0, tuple(parts))

          def key(tag):
              match = semver.match(tag)
              if not match:
                  return None
              return (
                  int(match.group(1)),
                  int(match.group(2)),
                  int(match.group(3)),
                  prerelease_key(match.group(4)),
              )

          current_key = key(current)
          stable_release = current_match.group(4) is None
          tags = subprocess.check_output(["git", "tag", "--list", "v*"], text=True).splitlines()
          candidates = []
          for tag in tags:
              tag_key = key(tag)
              if tag_key is None or tag_key >= current_key:
                  continue
              if stable_release and semver.match(tag).group(4) is not None:
                  continue
              candidates.append((tag_key, tag))

          if candidates:
              print(max(candidates)[1])
          PY
          )"

          notes_file="$RUNNER_TEMP/release-notes.md"

          if [[ "$TAG" == *-* ]]; then
            if [[ -n "$previous_tag" ]]; then
              printf 'Full changelog: [%s..%s](https://github.com/%s/compare/%s...%s)\n' "$previous_tag" "$TAG" "$REPO" "$previous_tag" "$TAG" > "$notes_file"
            else
              printf 'Full changelog: https://github.com/%s/commits/%s\n' "$REPO" "$TAG" > "$notes_file"
            fi
          else
            args=(
              -f tag_name="$TAG"
            )
            if [[ -n "$previous_tag" ]]; then
              args+=( -f previous_tag_name="$previous_tag" )
            fi
            gh api "repos/$REPO/releases/generate-notes" "${args[@]}" --jq .body > "$notes_file"
          fi

          cat "$notes_file"

      - name: Run GoReleaser
        if: steps.release-tag.outputs.should_release == 'true'
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "v2.16.0"
          args: release --clean --release-notes ${{ runner.temp }}/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.release-tag.outputs.tag }}
