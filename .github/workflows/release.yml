name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Check gofmt
        run: |
          unformatted="$(gofmt -l $(git ls-files "*.go"))"
          if [ -n "$unformatted" ]; then
            printf "Go files are not gofmt-formatted:\n%s\n" "$unformatted"
            exit 1
          fi

      - name: Run tests
        run: go test ./...

      - name: Check coverage
        run: |
          coverage_profile="${RUNNER_TEMP}/release-coverage.out"
          go test ./... -covermode=atomic -coverprofile="$coverage_profile"
          total="$(go tool cover -func="$coverage_profile" | awk '/^total:/ { gsub(/%/, "", $3); print $3 }')"
          minimum="70.0"

          awk -v total="$total" -v minimum="$minimum" 'BEGIN {
            if (total + 0 < minimum + 0) {
              printf "coverage %.1f%% is below required %.1f%%\n", total, minimum
              exit 1
            }
            printf "coverage %.1f%% meets required %.1f%%\n", total, minimum
          }'

          {
            printf "## Coverage\n\n"
            printf "Total statement coverage: **%s%%**\n\n" "$total"
            printf "Required minimum: **%s%%**\n" "$minimum"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage profile
        uses: actions/upload-artifact@v4
        with:
          name: release-coverage-profile
          path: ${{ runner.temp }}/release-coverage.out
          if-no-files-found: error

      - name: Run race tests
        run: go test -race ./...

      - name: Run vet
        run: go vet ./...

      - name: Run govulncheck
        run: |
          "$(go env GOPATH)/bin/govulncheck" ./...

      - name: Check GoReleaser config
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check

      - name: Run ShellCheck
        run: shellcheck scripts/*.sh

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
