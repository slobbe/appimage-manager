name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.version.outputs.release_version }}
      tag_version: ${{ steps.version.outputs.tag_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Derive and validate release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "error: tag must match v<major>.<minor>.<patch>" >&2
            exit 1
          fi

          echo "tag_version=$tag" >> "$GITHUB_OUTPUT"
          echo "release_version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

      - name: Generate shared release assets
        shell: bash
        run: |
          set -euo pipefail
          outdir="dist/${{ steps.version.outputs.tag_version }}"
          mkdir -p \
            "$outdir/share/man/man1" \
            "$outdir/share/bash-completion/completions" \
            "$outdir/share/zsh/site-functions" \
            "$outdir/share/fish/vendor_completions.d"

          AIM_MAN_OUTPUT="$outdir/share/man/man1/aim.1" \
          AIM_COMPLETION_DIR="$outdir" \
          go run -ldflags "-X main.version=${{ steps.version.outputs.release_version }}" -tags docgen ./cmd/aim

          tar -C "$outdir" -czf "$outdir/shared-assets.tar.gz" share

      - name: Upload shared release assets
        uses: actions/upload-artifact@v4
        with:
          name: shared-release-assets
          path: dist/${{ steps.version.outputs.tag_version }}/shared-assets.tar.gz
          if-no-files-found: error

  build:
    runs-on: ubuntu-latest
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        goarch:
          - amd64
          - arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download shared release assets
        uses: actions/download-artifact@v4
        with:
          name: shared-release-assets
          path: dist/${{ needs.verify.outputs.tag_version }}

      - name: Build and package ${{ matrix.goarch }}
        shell: bash
        run: |
          set -euo pipefail

          release_version="${{ needs.verify.outputs.release_version }}"
          tag_version="${{ needs.verify.outputs.tag_version }}"
          goarch="${{ matrix.goarch }}"
          outdir="dist/${tag_version}"
          bindir="${outdir}/bin"
          pkgdir="${outdir}/pkg-${goarch}"
          bin_name="aim-${release_version}-linux-${goarch}"
          tar_name="${bin_name}.tar.gz"
          archive="${outdir}/${tar_name}"

          mkdir -p "$bindir"
          tar -xzf "${outdir}/shared-assets.tar.gz" -C "$outdir"

          GOOS=linux GOARCH="${goarch}" CGO_ENABLED=0 \
            go build -trimpath -ldflags "-s -w -X main.version=${release_version}" -o "${bindir}/${bin_name}" ./cmd/aim

          mkdir -p "${pkgdir}/bin" "${pkgdir}/share"
          cp "${bindir}/${bin_name}" "${pkgdir}/bin/${bin_name}"
          cp -R "${outdir}/share/." "${pkgdir}/share/"

          tar -C "$pkgdir" -czf "$archive" .

          assert_tar_contains() {
            archive_path="$1"
            expected_path="$2"
            if ! tar -tzf "$archive_path" | grep -Fx -- "$expected_path" >/dev/null 2>&1; then
              echo "error: archive $archive_path missing $expected_path" >&2
              exit 1
            fi
          }

          assert_tar_contains "$archive" "./bin/${bin_name}"
          assert_tar_contains "$archive" "./share/man/man1/aim.1"
          assert_tar_contains "$archive" "./share/bash-completion/completions/aim"
          assert_tar_contains "$archive" "./share/zsh/site-functions/_aim"
          assert_tar_contains "$archive" "./share/fish/vendor_completions.d/aim.fish"

          rm -rf "$pkgdir"

      - name: Upload ${{ matrix.goarch }} release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goarch }}
          path: dist/${{ needs.verify.outputs.tag_version }}/aim-${{ needs.verify.outputs.release_version }}-linux-${{ matrix.goarch }}.tar.gz
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs:
      - verify
      - build

    steps:
      - name: Download packaged release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist/${{ needs.verify.outputs.tag_version }}

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          outdir="dist/${{ needs.verify.outputs.tag_version }}"
          cd "$outdir"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum \
              "aim-${{ needs.verify.outputs.release_version }}-linux-amd64.tar.gz" \
              "aim-${{ needs.verify.outputs.release_version }}-linux-arm64.tar.gz" \
              > checksums.txt
          elif command -v shasum >/dev/null 2>&1; then
            shasum -a 256 \
              "aim-${{ needs.verify.outputs.release_version }}-linux-amd64.tar.gz" \
              "aim-${{ needs.verify.outputs.release_version }}-linux-arm64.tar.gz" \
              > checksums.txt
          else
            echo "error: need sha256sum (coreutils) or shasum" >&2
            exit 1
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.verify.outputs.release_version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/${{ needs.verify.outputs.tag_version }}/aim-${{ needs.verify.outputs.release_version }}-linux-amd64.tar.gz
            dist/${{ needs.verify.outputs.tag_version }}/aim-${{ needs.verify.outputs.release_version }}-linux-arm64.tar.gz
            dist/${{ needs.verify.outputs.tag_version }}/checksums.txt
