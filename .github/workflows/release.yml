name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (vX.Y.Z or vX.Y.Z-<prerelease>)"
        required: true
        type: string

permissions:
  actions: read
  contents: write

concurrency:
  group: release-${{ github.event.workflow_run.head_sha || github.event.inputs.tag || github.run_id }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.head_branch == 'main' &&
          github.event.workflow_run.conclusion == 'success'
        )
      }}

    steps:
      - name: Resolve release tag
        id: release-tag
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const semverTag = /^v(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|[A-Za-z-][0-9A-Za-z-]*)(?:\.(?:0|[1-9]\d*|[A-Za-z-][0-9A-Za-z-]*))*))?$/;

            let sha;
            let tag;

            if (context.eventName === "workflow_dispatch") {
              tag = (core.getInput("tag") || "").trim();
              if (!semverTag.test(tag)) {
                core.setFailed(`Release tag ${tag} must match vX.Y.Z or vX.Y.Z-<prerelease>, for example v1.2.3 or v1.2.3-rc.1.`);
                return;
              }

              const ref = await github.rest.git.getRef({
                owner,
                repo,
                ref: `tags/${tag}`,
              });
              sha = ref.data.object.sha;
              if (ref.data.object.type === "tag") {
                const annotatedTag = await github.rest.git.getTag({
                  owner,
                  repo,
                  tag_sha: ref.data.object.sha,
                });
                sha = annotatedTag.data.object.sha;
              }

              const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
                owner,
                repo,
                workflow_id: "ci.yml",
                branch: "main",
                event: "push",
                status: "success",
                per_page: 100,
              });
              const matchingRun = runs.find((run) => run.head_sha === sha && run.conclusion === "success");
              if (!matchingRun) {
                core.setFailed(`No successful CI push run for ${sha} on main. Manual releases must reference a commit that passed CI.`);
                return;
              }
              core.info(`Found successful CI run ${matchingRun.html_url} for ${sha}.`);
            } else {
              sha = context.payload.workflow_run.head_sha;

              const refs = await github.paginate(github.rest.git.listMatchingRefs, {
                owner,
                repo,
                ref: "tags/v",
                per_page: 100,
              });

              const matchingTags = [];
              for (const ref of refs) {
                const name = ref.ref.replace("refs/tags/", "");
                if (!semverTag.test(name)) {
                  continue;
                }

                let targetSha = ref.object.sha;
                if (ref.object.type === "tag") {
                  const annotatedTag = await github.rest.git.getTag({
                    owner,
                    repo,
                    tag_sha: ref.object.sha,
                  });
                  targetSha = annotatedTag.data.object.sha;
                }

                if (targetSha === sha) {
                  matchingTags.push(name);
                }
              }

              const compareSemverTags = (left, right) => {
                const parse = (value) => {
                  const match = value.match(/^v?(\d+)\.(\d+)\.(\d+)(?:-([0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*))?$/);
                  if (!match) {
                    return null;
                  }
                  return {
                    major: Number(match[1]),
                    minor: Number(match[2]),
                    patch: Number(match[3]),
                    prerelease: match[4] || "",
                    hasPrerelease: Boolean(match[4]),
                  };
                };

                const a = parse(left);
                const b = parse(right);
                if (!a || !b) {
                  return left.localeCompare(right);
                }

                if (a.major !== b.major) return a.major - b.major;
                if (a.minor !== b.minor) return a.minor - b.minor;
                if (a.patch !== b.patch) return a.patch - b.patch;
                if (a.hasPrerelease !== b.hasPrerelease) return a.hasPrerelease ? -1 : 1;
                return a.prerelease.localeCompare(b.prerelease);
              };

              if (matchingTags.length === 0) {
                core.info(`CI passed for ${sha}, but no SemVer release tag points at that commit. Skipping release.`);
                core.setOutput("should_release", "false");
                return;
              }

              matchingTags.sort(compareSemverTags);
              tag = matchingTags[matchingTags.length - 1];
            }

            core.info(tag.includes("-") ? `Preparing prerelease ${tag}.` : `Preparing stable release ${tag}.`);
            core.setOutput("should_release", "true");
            core.setOutput("tag", tag);
            core.setOutput("sha", sha);

      - name: Checkout release tag
        if: steps.release-tag.outputs.should_release == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release-tag.outputs.tag }}
          fetch-depth: 0

      - name: Setup Go
        if: steps.release-tag.outputs.should_release == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check GoReleaser config
        if: steps.release-tag.outputs.should_release == 'true'
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check

      - name: Run GoReleaser
        if: steps.release-tag.outputs.should_release == 'true'
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.release-tag.outputs.tag }}
