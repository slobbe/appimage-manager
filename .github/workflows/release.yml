name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  actions: read
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve tagged commit
        id: tagged-commit
        run: |
          printf "sha=%s\n" "$(git rev-list -n 1 "$GITHUB_REF_NAME")" >> "$GITHUB_OUTPUT"

      - name: Verify CI passed for tagged commit
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = "${{ steps.tagged-commit.outputs.sha }}";

            const { data } = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: "ci.yml",
              branch: "main",
              event: "push",
              status: "success",
              per_page: 100,
            });

            const matchingRun = data.workflow_runs.find((run) => (
              run.head_sha === sha &&
              run.conclusion === "success"
            ));

            if (!matchingRun) {
              core.setFailed(`No successful CI push run for ${sha} on main. Tag releases must reference a commit that already passed CI.`);
              return;
            }

            core.info(`Found successful CI run ${matchingRun.html_url} for ${sha}.`);

      - name: Check GoReleaser config
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
